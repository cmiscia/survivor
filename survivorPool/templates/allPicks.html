{% extends 'base.html' %}

{% block content %}
{% if user.is_authenticated %}
<h1 class="mb-3">2025 League Picks</h1>
<p class="text-muted mb-3" style="font-size:0.88rem;">
    Weeks as rows, players as columns.&nbsp;
    <span style="background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:2px;font-weight:600;font-size:0.8rem;">WIN</span>&nbsp;
    <span style="background:#fee2e2;color:#7f1d1d;padding:2px 8px;border-radius:2px;font-weight:600;font-size:0.8rem;">LOSS</span>&nbsp;
    <span style="background:#fef3c7;color:#78350f;padding:2px 8px;border-radius:2px;font-weight:600;font-size:0.8rem;">TBD</span>
</p>

<div class="table-responsive-wrapper">
    {{ df | safe }}
</div>

{% else %}
<h1>Login to get started</h1>
{% endif %}
{% endblock %}
