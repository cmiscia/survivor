{% extends 'base.html' %}
{% block title %}Edit Pick{% endblock %}
{% block content %}

{% if user.is_authenticated %}
    <h1>Update Pick for Week {{ pick.week }}</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
    <button class="btn btn-primary">Submit</button>
    <br/><br/>
    <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>
{% else %}

You need to be logged in to edit a Pick!

{% endif %}

{% endblock %}
