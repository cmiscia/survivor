{% extends 'base.html' %}

{% block content %}

{% if user.is_authenticated %}
    <h1>Choose Your Pick...</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
    <button class="btn btn-primary">Pick</button>
    <br/><br/>
    <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>
{% else %}

    You need to be logged in to make a Pick!
    
{% endif %}
{% endblock %}
